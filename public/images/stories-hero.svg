<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B0B"/>
      <stop offset="0.5" stop-color="#1A1310"/>
      <stop offset="1" stop-color="#2A1A14"/>
    </linearGradient>
    <radialGradient id="glowR" cx="0.7" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#C62828" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C62828" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="0.2" cy="0.8" r="0.6">
      <stop offset="0" stop-color="#C8A96B" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#C8A96B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotsS" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.2" fill="#C8A96B" fill-opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bgS)"/>
  <rect width="1600" height="900" fill="url(#dotsS)"/>
  <rect width="1600" height="900" fill="url(#glowR)"/>
  <rect width="1600" height="900" fill="url(#glowG)"/>
