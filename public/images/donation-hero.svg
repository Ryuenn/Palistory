<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B0B"/>
      <stop offset="1" stop-color="#1F0E0E"/>
    </linearGradient>
    <radialGradient id="glowD" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0" stop-color="#C62828" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C62828" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgD)"/>
  <rect width="1600" height="900" fill="url(#glowD)"/>
  <!-- Olive branch wreath -->
  <g transform="translate(800 450)" stroke="#4B5D3A" fill="none" stroke-width="2" stroke-opacity="0.6">
    <path d="M -260 0 Q -200 -160 0 -210 Q 200 -160 260 0 Q 200 160 0 210 Q -200 160 -260 0 Z"/>
  </g>
  <g transform="translate(800 450)" fill="#4B5D3A" fill-opacity="0.65">
    <g>
      <ellipse cx="-240" cy="-60" rx="16" ry="6" transform="rotate(-60 -240 -60)"/>
      <ellipse cx="-220" cy="-110" rx="16" ry="6" transform="rotate(-70 -220 -110)"/>
      <ellipse cx="-160" cy="-170" rx="16" ry="6" transform="rotate(-50 -160 -170)"/>
      <ellipse cx="-80" cy="-200" rx="16" ry="6" transform="rotate(-30 -80 -200)"/>
      <ellipse cx="80" cy="-200" rx="16" ry="6" transform="rotate(30 80 -200)"/>
      <ellipse cx="160" cy="-170" rx="16" ry="6" transform="rotate(50 160 -170)"/>
      <ellipse cx="220" cy="-110" rx="16" ry="6" transform="rotate(70 220 -110)"/>
      <ellipse cx="240" cy="-60" rx="16" ry="6" transform="rotate(60 240 -60)"/>
      <ellipse cx="240" cy="60" rx="16" ry="6" transform="rotate(-60 240 60)"/>
      <ellipse cx="220" cy="110" rx="16" ry="6" transform="rotate(-70 220 110)"/>
      <ellipse cx="160" cy="170" rx="16" ry="6" transform="rotate(-50 160 170)"/>
      <ellipse cx="80" cy="200" rx="16" ry="6" transform="rotate(-30 80 200)"/>
      <ellipse cx="-80" cy="200" rx="16" ry="6" transform="rotate(30 -80 200)"/>
      <ellipse cx="-160" cy="170" rx="16" ry="6" transform="rotate(50 -160 170)"/>
      <ellipse cx="-220" cy="110" rx="16" ry="6" transform="rotate(70 -220 110)"/>
      <ellipse cx="-240" cy="60" rx="16" ry="6" transform="rotate(60 -240 60)"/>
    </g>
  </g>
  <!-- Heart center -->
  <g transform="translate(800 450) scale(2.5)" fill="#C62828">
    <path d="M0 30 C -25 0 -50 -10 -50 -30 C -50 -50 -30 -55 -20 -45 C -10 -55 0 -50 0 -30 C 0 -50 10 -55 20 -45 C 30 -55 50 -50 50 -30 C 50 -10 25 0 0 30 Z"/>
  </g>
  <!-- Gold rays -->
  <g stroke="#C8A96B" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="800" y1="100" x2="800" y2="160"/>
    <line x1="800" y1="740" x2="800" y2="800"/>
    <line x1="380" y1="450" x2="450" y2="450"/>
    <line x1="1150" y1="450" x2="1220" y2="450"/>
  </g>
</svg>
